services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./documents:/app/documents
      - ./faiss_index:/app/faiss_index
    
  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_URL: http://backend:8000
    ports:
      - "4321:80"
    depends_on:
      - backend